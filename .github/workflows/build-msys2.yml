name: Build MSYS2

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build Windows UCRT64
    runs-on: windows-2025

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up CPython
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-opencl-headers
            mingw-w64-ucrt-x86_64-opencl-icd

      - name: Prepare VapourSynth R77 wheel
        shell: cmd
        run: >-
          "%pythonLocation%\python.exe" tools\ci_prepare_msys2.py

      - name: Build plugin
        run: /ucrt64/bin/python tools/ci_build_msys2.py --clean

      - name: Smoke-load artifact
        shell: cmd
        run: >-
          "%pythonLocation%\python.exe" tools\smoke_load_artifact.py
          --vapoursynth-root _deps\vapoursynth-wheel-R77
          --artifact-dir dist\msys2-ucrt64
          --exercise-filter

      - name: Smoke-load artifact through manifest autoload
        shell: cmd
        run: >-
          "%pythonLocation%\python.exe" tools\smoke_load_artifact.py
          --vapoursynth-root _deps\vapoursynth-wheel-R77
          --artifact-dir dist\msys2-ucrt64
          --autoload
          --exercise-filter

      - name: Pack release asset
        shell: cmd
        run: >-
          "%pythonLocation%\python.exe" tools\package_plugin_zip.py
          --input-dir dist\msys2-ucrt64
          --output dist\nnedi3cl-msys2-ucrt64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nnedi3cl-msys2-ucrt64
          path: dist/msys2-ucrt64

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        shell: cmd
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release view "%RELEASE_TAG%" >NUL 2>NUL || gh release create "%RELEASE_TAG%" --title "%RELEASE_TAG%" --notes "Automated MSYS2/UCRT64 build."
          gh release upload "%RELEASE_TAG%" dist\nnedi3cl-msys2-ucrt64.zip --clobber
