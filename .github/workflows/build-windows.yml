name: Build Windows

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade meson ninja

      - name: Prepare dependencies
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%i"
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvars64.bat"
          python tools\ci_prepare_windows.py

      - name: Build plugin
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%i"
          call "%VSINSTALL%\VC\Auxiliary\Build\vcvars64.bat"
          python tools\ci_build_windows.py --clean

      - name: Smoke-load artifact
        run: >-
          python tools/smoke_load_artifact.py
          --vapoursynth-root _deps/vapoursynth-portable-R73
          --artifact-dir dist/windows-x64
          --exercise-filter

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nnedi3cl-windows-x64
          path: dist/windows-x64
